<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% if title and path != "home" %}{{ title }} — Feuerwehr Untereisesheim{% else %}Feuerwehr Untereisesheim{% endif %}</title>
    {% if description %}
      <meta name="description" content="{{ description }}" />
    {% endif %}
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" type="text/css" href="{{ '/static/css/style.css' | url }}" />
    {% if prism == true %}
      <link rel="stylesheet" type="text/css" href="{{ '/static/css/prism-tomorrow.css' | url }}" />
    {% endif %}
  </head>
  <body class="font-sans antialiased bg-white text-gray-900">

    <!-- Emergency bar -->
    <div class="bg-[#CC1F1A] text-white">
      <div class="container mx-auto px-6 py-2 flex items-center justify-center sm:justify-between gap-4 text-sm font-semibold">
        <span>
          Im Notfall:
          <a href="tel:112" class="underline font-black text-base ml-1">112</a>
        </span>
        <span class="hidden sm:block text-white/80 font-normal tracking-wide">
          Retten &middot; Alarmieren &middot; Löschen
        </span>
      </div>
    </div>

    {% include "./partials/navbar.html" %}

    {{ content | safe }}

    {% include "./partials/footer.html" %}

    <!-- Scroll-to-top button -->
    <div x-data="{ show: false }" @scroll.window="show = window.scrollY > 300">
      <button x-show="show"
              x-transition:enter="transition ease-out duration-200"
              x-transition:enter-start="opacity-0 translate-y-2"
              x-transition:enter-end="opacity-100 translate-y-0"
              x-transition:leave="transition ease-in duration-150"
              x-transition:leave-start="opacity-100 translate-y-0"
              x-transition:leave-end="opacity-0 translate-y-2"
              @click="window.scrollTo({ top: 0, behavior: 'smooth' })"
              class="fixed bottom-6 right-6 z-50 w-12 h-12 bg-[#CC1F1A] text-white rounded-full shadow-lg shadow-[#CC1F1A]/30 hover:bg-[#A01915] transition-colors flex items-center justify-center"
              aria-label="Zurück nach oben">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7"/>
        </svg>
      </button>
    </div>

    <script src="{{ '/static/js/alpine.js' | url }}"></script>

    {% if path == "home" %}
      <script type="text/javascript" src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    {% endif %}

  </body>
</html>
